name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run validate
      - name: Verify bundle is up to date
        # The committed bin/librarian-codex-hook.js is what users actually
        # run. A drifted bundle is a real bug — rebuild and fail if the JS
        # content moved. (PROVENANCE.json is build metadata, not committed;
        # see .gitignore for why.)
        run: |
          npm run build
          if ! git diff --quiet bin/librarian-codex-hook.js; then
            echo "::error::bin/librarian-codex-hook.js is out of date — run 'npm run build' and commit the result"
            git diff bin/librarian-codex-hook.js
            exit 1
          fi
      - run: npm run smoke
