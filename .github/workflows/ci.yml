name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run validate
      - name: Verify bundle is up to date
        # The committed bin/librarian-codex-hook.js is what users actually run.
        # A drifted bundle is a real bug — rebuild and fail if anything moved.
        run: |
          npm run build
          if ! git diff --quiet bin/; then
            echo "::error::bin/ is out of date — run 'npm run build' and commit the result"
            git diff bin/
            exit 1
          fi
      - run: npm run smoke
