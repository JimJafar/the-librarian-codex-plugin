name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [20, 22, 24]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run validate
      - name: Verify bundle is up to date
        # The committed bin/librarian-codex-hook.js is what users actually
        # run. A drifted bundle is a real bug — rebuild and fail if the JS
        # content moved. (PROVENANCE.json is build metadata, not committed;
        # see .gitignore for why.)
        run: |
          npm run build
          if ! git diff --quiet plugins/the-librarian/bin/librarian-codex-hook.js; then
            echo "::error::plugins/the-librarian/bin/librarian-codex-hook.js is out of date — run 'npm run build' and commit the result"
            git diff plugins/the-librarian/bin/librarian-codex-hook.js
            exit 1
          fi
      - run: npm run smoke

  release-guard:
    name: Release hygiene (version bump + no [Unreleased])
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      # Every PR must bump the version (package.json + the plugin manifest) and
      # file a dated CHANGELOG entry — no `[Unreleased]`. On a PR we hand the
      # guard the base-main version so it can prove the bump happened.
      - name: Check release hygiene
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            git fetch --depth=1 origin main
            RELEASE_BASE_VERSION="$(git show origin/main:package.json | node -p "JSON.parse(require('fs').readFileSync(0, 'utf8')).version")"
            export RELEASE_BASE_VERSION
            echo "Base (origin/main) version: $RELEASE_BASE_VERSION"
          fi
          node scripts/check-release.mjs
